<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draft Assistant</title>

<style>
  :root {
    --gold: #C8AA6E; --gold-dark: #785A28; --blue-dark: #010A13;
    --blue-mid: #0A1428; --blue-accent: #0AC8B9; --blue-light: #CDFAFA;
    --red: #E84057; --purple: #9B59B6; --orange: #F39C12; --green: #27AE60;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--blue-dark); color: var(--blue-light);
    font-family: 'Spiegel', 'Segoe UI', sans-serif; min-height: 100vh;
  }
  .header {
    background: linear-gradient(180deg, var(--blue-mid), var(--blue-dark));
    border-bottom: 2px solid var(--gold-dark); padding: 20px 16px 12px; text-align: center;
  }
  .header h1 {
    font-size: 22px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
    background: linear-gradient(135deg, var(--gold), #F0E6D2, var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .sub { font-size: 11px; color: var(--gold); opacity: 0.5; letter-spacing: 1px; margin-top: 4px; }
  .status-bar {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 10px; font-size: 11px; padding: 4px 12px; border-radius: 20px;
    display: inline-flex;
  }
  .status-bar.connected { background: #27AE6022; color: var(--green); border: 1px solid #27AE6044; }
  .status-bar.offline { background: #E8405722; color: var(--red); border: 1px solid #E8405744; }
  .status-bar.loading { background: #F39C1222; color: var(--orange); border: 1px solid #F39C1244; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-bar.connected .status-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-bar.offline .status-dot { background: var(--red); }
  .status-bar.loading .status-dot { background: var(--orange); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .tabs {
    display: flex; margin-top: 12px; border-radius: 6px; overflow: hidden;
    border: 1px solid var(--gold-dark);
  }
  .tabs button {
    flex: 1; padding: 8px 0; font-size: 12px; font-weight: 700; letter-spacing: 1px;
    border: none; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .tabs button.active { background: var(--gold); color: var(--blue-dark); }
  .tabs button:not(.active) { background: transparent; color: #CDFAFA88; }

  .container { padding: 16px; max-width: 600px; margin: 0 auto; }
  .section { margin-top: 16px; }
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .section-title .line { flex: 1; height: 1px; }

  .role-bar { display: flex; gap: 6px; }
  .role-btn {
    flex: 1; padding: 8px 4px; font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; border-radius: 4px; cursor: pointer; transition: all 0.15s;
    font-family: inherit; border: 1px solid var(--gold-dark); background: transparent; color: var(--gold);
  }
  .role-btn.active { background: var(--gold); color: var(--blue-dark); border-color: var(--gold); }

  .pick-order { display: flex; gap: 8px; }
  .pick-btn {
    flex: 1; padding: 10px; font-size: 13px; font-weight: 600; border-radius: 6px;
    cursor: pointer; transition: all 0.15s; font-family: inherit; border: 1px solid var(--gold-dark);
    background: transparent; color: #CDFAFA88;
  }
  .pick-btn.active-blind { background: #E8405733; color: var(--red); border-color: var(--red); }
  .pick-btn.active-counter { background: #0AC8B933; color: var(--blue-accent); border-color: var(--blue-accent); }

  .chip {
    display: inline-flex; align-items: center; gap: 6px; border-radius: 6px;
    padding: 4px 10px; font-size: 13px; font-weight: 600;
  }
  .chip .remove {
    background: none; border: none; cursor: pointer; font-size: 14px; padding: 0;
    opacity: 0.7; line-height: 1;
  }
  .chip-wrap { display: flex; flex-wrap: wrap; gap: 6px; }

  .search-wrap { position: relative; width: 100%; margin-top: 6px; }
  .search-input {
    width: 100%; padding: 8px 12px; font-size: 14px; background: var(--blue-mid);
    border: 1px solid var(--gold-dark); border-radius: 6px; color: var(--blue-light);
    outline: none; font-family: inherit;
  }
  .search-dropdown {
    position: absolute; top: 100%; left: 0; right: 0; background: var(--blue-mid);
    border: 1px solid var(--gold-dark); border-radius: 0 0 6px 6px; z-index: 100;
    max-height: 200px; overflow-y: auto;
  }
  .search-item {
    padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--blue-light); border-bottom: 1px solid #785A2822;
  }
  .search-item:hover { background: #1a2a40; }
  .search-item .meta { margin-left: auto; font-size: 11px; color: var(--gold); opacity: 0.6; }

  .enemy-card {
    background: #E840570A; border: 1px solid #E8405722; border-radius: 8px; padding: 8px 10px;
  }
  .enemy-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .enemy-role-bar { display: flex; gap: 3px; }
  .enemy-role-btn {
    flex: 1; padding: 3px 2px; font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; border-radius: 3px; cursor: pointer; transition: all 0.1s;
    font-family: inherit;
  }
  .enemy-role-btn.assigned { background: var(--red); color: #fff; border: 1px solid var(--red); }
  .enemy-role-btn:not(.assigned) { background: transparent; color: #E8405788; border: 1px solid #E8405733; }

  .analyze-btn {
    width: 100%; padding: 14px; font-size: 15px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 2px; border: none; border-radius: 8px; cursor: pointer; margin-top: 8px;
    font-family: inherit; transition: all 0.2s;
  }
  .analyze-btn.ready { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: var(--blue-dark); }
  .analyze-btn.disabled { background: #333; color: #666; cursor: not-allowed; }

  .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .comp-card { border-radius: 8px; padding: 10px; }
  .comp-card-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }

  .rec-card {
    border-radius: 8px; padding: 12px 14px; position: relative; overflow: hidden;
    cursor: pointer; transition: all 0.15s;
  }
  .rec-card:hover { transform: translateY(-1px); }
  .best-badge {
    position: absolute; top: 0; right: 0; background: var(--gold); color: var(--blue-dark);
    font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 0 0 0 6px; letter-spacing: 1px;
  }
  .rec-row { display: flex; align-items: center; gap: 10px; }
  .rec-emoji { font-size: 28px; }
  .rec-name { font-size: 16px; font-weight: 700; }
  .rec-sub { font-size: 11px; opacity: 0.55; margin-top: 2px; }
  .rec-score { font-size: 22px; font-weight: 800; text-align: right; }
  .rec-hint { font-size: 9px; color: var(--blue-accent); opacity: 0.6; }
  .rec-tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .rec-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }

  .wr-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 700; margin-left: 4px;
  }

  .threat-box { border-radius: 8px; padding: 12px; margin-bottom: 14px; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 700; }

  .rune-box { border-radius: 8px; padding: 14px; }
  .rune-icon { font-size: 32px; }
  .rune-name { font-size: 16px; font-weight: 700; }

  .item-row {
    border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px;
  }
  .item-num {
    width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 800;
  }
  .item-label { font-size: 9px; font-weight: 600; margin-left: auto; }

  .adapt-box { border-radius: 8px; padding: 12px; }
  .adapt-line { font-size: 12px; padding: 4px 0; display: flex; align-items: center; gap: 6px; }
</style>

// MATCHUP ENGINE — uses API data when available
// ═══════════════════════════════════════
function getMatchupScore(yours, theirs) {
  // Try API data first
  if (state.apiData) {
    const champData = state.apiData.champions[yours];
    if (champData) {
      if (champData.strongAgainst && champData.strongAgainst.includes(theirs)) return 1;
      if (champData.counters && champData.counters.includes(theirs)) return -1;
    }
    // Also check lane matchups
    const lm = state.apiData.laneMatchups;
    if (lm && lm[yours] && lm[yours][theirs]) {
      const wr = lm[yours][theirs].winrate;
      if (wr > 55) return 1;
      if (wr < 45) return -1;
      return 0;
    }
  }
  // Fallback to hardcoded
  const d = FALLBACK_MATCHUPS.find(m => m.champ === yours);
  if (!d) return 0;
  if (d.beats && d.beats.includes(theirs)) return 1;
  if (d.losesTo && d.losesTo.includes(theirs)) return -1;
  return 0;
}

function getWinrateVs(yours, theirs) {
  if (state.apiData && state.apiData.laneMatchups) {
    const lm = state.apiData.laneMatchups;
    if (lm[yours] && lm[yours][theirs]) {
      return lm[yours][theirs].winrate;
    }
  }
  return null;
}

function getChampWinrate(name) {
  if (state.apiData && state.apiData.champions[name]) {
    return state.apiData.champions[name].winrate;
  }
  return null;
}

// ═══════════════════════════════════════
// The rest of the logic is the same as the artifact
// but uses the API-aware matchup functions above
// ═══════════════════════════════════════

function getChampByName(n) { return CHAMPIONS.find(c => c.name === n); }

function analyzeTeamComp(team) {
  const champs = team.map(getChampByName).filter(Boolean);
  const allTags = champs.flatMap(c => c.tags);
  const tc = {}; allTags.forEach(t => { tc[t] = (tc[t]||0)+1; });
  return {
    adCount: champs.filter(c=>c.dmgType==="ad").length,
    apCount: champs.filter(c=>c.dmgType==="ap").length,
    mixedCount: champs.filter(c=>c.dmgType==="mixed").length,
    hasEngage: allTags.includes("engage"), hasPeel: allTags.includes("peel")||allTags.includes("enchanter"),
    hasTank: allTags.includes("tank"),
    themes: Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,4).map(e=>e[0]),
  };
}

function recommendPick() {
  const { allyTeam, enemyTeam, champPool, myRole, hasCounterpick, enemyRoles } = state;
  const myComp = analyzeTeamComp(allyTeam), enemyComp = analyzeTeamComp(enemyTeam);
  const taken = new Set([...allyTeam, ...enemyTeam]);

  return champPool.filter(n => !taken.has(n)).map(name => {
    const champ = getChampByName(name);
    if (!champ || !champ.roles.includes(myRole)) return { name, score: -100, reasons: [] };
    let score = 0; const reasons = [];

    if (hasCounterpick) {
      const enemyInLane = enemyTeam.filter(e => {
        if (enemyRoles[e]) return enemyRoles[e] === myRole;
        return getChampByName(e)?.roles.includes(myRole);
      });
      enemyInLane.forEach(enemy => {
        const ms = getMatchupScore(name, enemy);
        const wr = getWinrateVs(name, enemy);
        if (ms === 1) { score += 30; reasons.push("Counters " + enemy + (wr ? " (" + wr + "% WR)" : "")); }
        if (ms === -1) { score -= 25; reasons.push("Loses to " + enemy + (wr ? " (" + wr + "% WR)" : "")); }
        if (ms === 0 && wr) { reasons.push("vs " + enemy + ": " + wr + "% WR"); }
      });
    } else {
      score += (champ.blindScore || 5) * 3; reasons.push("Blind: " + champ.blindScore + "/10");
    }

    // Winrate bonus from API
    const champWR = getChampWinrate(name);
    if (champWR) {
      if (champWR > 52) { score += 5; reasons.push(champWR + "% WR overall"); }
      if (champWR < 48) { score -= 5; }
    }

    if (champ.dmgType==="ap"&&myComp.apCount<=myComp.adCount){score+=12;reasons.push("Balances AP");}
    else if(champ.dmgType==="ad"&&myComp.adCount<=myComp.apCount){score+=12;reasons.push("Balances AD");}
    else if(champ.dmgType==="mixed"){score+=6;reasons.push("Mixed dmg");}
    if(champ.dmgType==="ad"&&myComp.adCount>=3){score-=10;reasons.push("Too much AD");}
    if(champ.dmgType==="ap"&&myComp.apCount>=3){score-=10;reasons.push("Too much AP");}
    if(!myComp.hasEngage&&champ.tags.includes("engage")){score+=10;reasons.push("Adds engage");}
    if(!myComp.hasTank&&champ.tags.includes("tank")){score+=8;reasons.push("Adds frontline");}
    if(!myComp.hasPeel&&(champ.tags.includes("peel")||champ.tags.includes("enchanter"))){score+=8;reasons.push("Adds peel");}
    if(enemyComp.themes.includes("dive")&&champ.tags.includes("disengage")){score+=8;reasons.push("Counters dive");}
    if(enemyComp.themes.includes("poke")&&champ.tags.includes("engage")){score+=6;reasons.push("Engage vs poke");}
    if(enemyComp.themes.includes("assassin")&&(champ.tags.includes("peel")||champ.tags.includes("tank"))){score+=6;reasons.push("Protects vs assassins");}
    if(myComp.themes?.includes("teamfight")&&champ.tags.includes("teamfight")){score+=4;reasons.push("Teamfight synergy");}
    return { name, score, reasons, champ };
  }).filter(s => s.score > -100).sort((a,b) => b.score - a.score).slice(0, 5);
}

function getBuild(champName, enemies) {
  const champ = getChampByName(champName); if (!champ) return null;
  const en = enemies.map(n=>CHAMPIONS.find(c=>c.name===n)).filter(Boolean);
  const adC=en.filter(c=>c.dmgType==="ad").length, apC=en.filter(c=>c.dmgType==="ap").length;
  const tankC=en.filter(c=>c.tags.some(t=>["tank","juggernaut"].includes(t))).length;
  const healC=en.flatMap(c=>c.tags).filter(t=>["drain-tank","healing","enchanter"].includes(t)).length;
  const analysis={heavyAD:adC>=3,heavyAP:apC>=3,heavyTank:tankC>=2,healHeavy:healC>=2,adCount:adC,apCount:apC};

  // ─── Try API build data first ───
  if (state.apiData && state.apiData.champions[champName] && state.apiData.champions[champName].build) {
    const bd = state.apiData.champions[champName].build;
    const totalGames = bd.games || 0;

    // Items — use situational data if enemy comp is skewed, otherwise default
    let itemSource = bd.items;
    let itemLabel = "Most built (all games)";
    if (analysis.heavyAD && bd.itemsVsHeavyAD.length >= 3) { itemSource = bd.itemsVsHeavyAD; itemLabel = "Built vs heavy AD teams"; }
    if (analysis.heavyAP && bd.itemsVsHeavyAP.length >= 3) { itemSource = bd.itemsVsHeavyAP; itemLabel = "Built vs heavy AP teams"; }

    const items = itemSource.slice(0, 6).map(i => ({ name: i.name, count: i.count, rate: Math.round((i.count / totalGames) * 100) }));
    const boots = bd.boots.slice(0, 2).map(b => ({ name: b.name, count: b.count, rate: Math.round((b.count / totalGames) * 100) }));

    // Keystones — situational
    let keystoneSource = bd.keystones;
    if (analysis.heavyAD && bd.keystonesVsHeavyAD.length >= 1) keystoneSource = bd.keystonesVsHeavyAD;
    if (analysis.heavyAP && bd.keystonesVsHeavyAP.length >= 1) keystoneSource = bd.keystonesVsHeavyAP;
    const keystones = keystoneSource.slice(0, 3).map(k => ({ name: k.name, count: k.count, rate: Math.round((k.count / totalGames) * 100) }));
    const secTrees = bd.secondaryTrees.slice(0, 2).map(t => ({ name: t.name, count: t.count, rate: Math.round((t.count / totalGames) * 100) }));
    const secRunes = bd.secondaryRunes.slice(0, 4).map(r => ({ name: r.name, count: r.count, rate: Math.round((r.count / totalGames) * 100) }));

    return {
      champ, analysis, source: "api", totalGames, itemLabel,
      items, boots, keystones, secTrees, secRunes,
      adapt: [], notes: []
    };
  }

  // ─── Fallback to hardcoded templates ───
  const t = BUILD_TEMPLATES[champ.buildClass]; if (!t) return null;
  let items=[...t.core]; let boots=t.boots; const adapt=[], notes=[];
  if(analysis.heavyAP||analysis.manyCC){boots="Mercury's Treads";adapt.push("Merc Treads vs AP/CC");}
  const doAdapt=(cond,cfg)=>{if(!cond||!cfg)return;if(cfg.swap){items=items.map(i=>i===cfg.swap?cfg.with:i);adapt.push(cfg.with+" replaces "+cfg.swap);}if(cfg.add&&!items.includes(cfg.add)){items.push(cfg.add);adapt.push("Added "+cfg.add);}if(cfg.note)notes.push(cfg.note);};
  doAdapt(analysis.heavyAP,t.vsAP); doAdapt(analysis.heavyAD,t.vsAD); doAdapt(analysis.heavyTank,t.vsTank);
  if(analysis.healHeavy){const ah=champ.dmgType==="ap"?"Morellonomicon":champ.tags.includes("tank")?"Thornmail":"Mortal Reminder";if(!items.includes(ah)){items.push(ah);adapt.push(ah+" anti-heal");}}
  const rune=RUNE_PAGES[t.runes.primary], altRune=RUNE_PAGES[t.runes.alt];
  return{champ, source: "hardcoded", items: items.slice(0,6).map(n=>({name:n})), boots: [{name:boots}], keystones: [{name:rune?.name||"Unknown",icon:rune?.icon}], secTrees:[{name:t.runes.sec}], secRunes: t.secRunes.map(n=>({name:n})), adapt, notes, analysis, rune, altRune, secTree:t.runes.sec};
}

async function connectAPI() {
  state.apiLoading = true; render();
  try {
    const res = await fetch(API_URL + "/api/stats");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    state.apiData = data;
    state.apiConnected = true;
    state.apiLoading = false;
    console.log("Connected to Riot API! Champions:", Object.keys(data.champions).length);

    // Merge any API-discovered champions not in our hardcoded list
    if (data.champions) {
      for (const name in data.champions) {
        if (!CHAMPIONS.find(c => c.name === name)) {
          const d = data.champions[name];
          const roleMap = { TOP: "top", JUNGLE: "jungle", MIDDLE: "mid", BOTTOM: "adc", UTILITY: "support" };
          CHAMPIONS.push({
            name, roles: [roleMap[d.role] || "mid"], dmgType: "mixed",
            tags: ["unknown"], blindScore: 5, sprite: "❓", buildClass: "ad-bruiser"
          });
        }
      }
    }
  } catch (e) {
    console.log("API not available, using hardcoded data:", e.message);
    state.apiConnected = false;
    state.apiLoading = false;
  }
  render();
}

      b.boots.forEach((boot, i) => {
        h += '<div class="item-row" style="background:var(--blue-accent)08;border:1px solid var(--blue-accent)22;margin-bottom:4px"><div style="font-size:14px;font-weight:600;color:var(--blue-accent);flex:1">👟 ' + boot.name + '</div>';
        if (boot.rate) h += '<span style="font-size:11px;color:var(--blue-accent);opacity:0.7">' + boot.rate + '%</span>';
        h += '</div>';
      });
    }

    // ─── Items ───
    if (isApi && b.itemLabel) {
      h += sec("ITEMS — " + b.itemLabel.toUpperCase(),"var(--gold)");
    } else {
      h += sec("ITEM BUILD","var(--gold)");
    }
    h += '<div style="display:flex;flex-direction:column;gap:6px">';
    if (b.items && b.items.length) {
      b.items.forEach((item, i) => {
        const isCore = i < 3;
        h += '<div class="item-row" style="background:' + (isCore ? 'var(--gold)0A' : 'var(--blue-mid)') + ';border:1px solid ' + (isCore ? 'var(--gold)' : 'var(--gold-dark)') + '33">';
        h += '<div class="item-num" style="background:var(--gold)22;color:var(--gold)">' + (i+1) + '</div>';
        h += '<div style="font-size:14px;font-weight:600;color:' + (isCore ? 'var(--gold)' : 'var(--blue-light)') + '">' + item.name + '</div>';
        if (item.rate) {
          h += '<div style="margin-left:auto;display:flex;align-items:center;gap:6px">';
          h += '<div style="width:50px;height:4px;background:#333;border-radius:2px;overflow:hidden"><div style="width:' + Math.min(item.rate, 100) + '%;height:100%;background:var(--gold);border-radius:2px"></div></div>';
          h += '<span style="font-size:11px;color:var(--gold);opacity:0.8;min-width:30px;text-align:right">' + item.rate + '%</span>';
          h += '</div>';
        } else {
          h += '<span class="item-label" style="color:' + (isCore ? 'var(--gold)88' : 'var(--blue-accent)88') + '">' + (isCore ? 'CORE' : 'SITUATIONAL') + '</span>';
        }
        h += '</div>';
      });
    }
    h += '</div>';

    // Adaptations (hardcoded only)
    if(b.adapt && b.adapt.length) {
      h += sec("WHY THESE ITEMS","#F39C12");
      h += '<div class="adapt-box" style="background:#F39C1211;border:1px solid #F39C1233">';
      b.adapt.forEach(a => h += '<div class="adapt-line" style="color:#F39C12"><span style="font-size:8px">▸</span> ' + a + '</div>');
      h += '</div>';
    }
    h += '</div>';
  }
  return h;
}

// Helpers
const BLUE_MID = "#0A1428";
function sec(title, color) { return `<div class="section"><div class="section-title" style="color:${color}"><span>${title}</span><div class="line" style="background:${color}33"></div></div>`; }
function chip(name, color, removeFn) { const c=getChampByName(name); return `<div class="chip" style="background:${color}22;border:1px solid ${color}55;color:${color}"><span>${c?.sprite||'?'}</span><span>${name}</span><button class="remove" style="color:${color}" onclick="${removeFn}('${name}')">×</button></div>`; }
function tag(text, color) { return `<span class="tag" style="background:${color}22;color:${color}">${text}</span>`; }
function compCard(title, comp, color) {
  let h = `<div class="comp-card" style="background:${color}08;border:1px solid ${color}33"><div class="comp-card-title" style="color:${color}">${title.toUpperCase()}</div><div style="font-size:12px;line-height:1.6">AD: ${comp.adCount} / AP: ${comp.apCount} / Mix: ${comp.mixedCount}<div style="font-size:10px;opacity:0.55;margin-top:4px">${comp.hasEngage?'✅':'❌'} Engage ${comp.hasTank?'✅':'❌'} Tank ${comp.hasPeel?'✅':'❌'} Peel</div>`;
  if(comp.themes.length) { h += '<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:3px">'; comp.themes.forEach(t => h += `<span style="font-size:9px;padding:1px 5px;background:${color}22;color:${color};border-radius:3px;font-weight:600">${t}</span>`); h += '</div>'; }
  return h + '</div></div>';
}
function searchBox(id, placeholder, fn, filterRole) {
  return `<div class="search-wrap" style="margin-top:6px"><input class="search-input" id="${id}" placeholder="${placeholder}" autocomplete="off" data-fn="${fn}" data-role="${filterRole||''}" oninput="onSearch(this)" onfocus="onSearch(this)"><div class="search-dropdown" id="${id}-dd" style="display:none"></div></div>`;
}

// ═══════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════
window.setPhase = p => { state.phase = p; render(); };
window.setRole = r => { state.myRole = r; state.showResults = false; render(); };
window.setPick = v => { state.hasCounterpick = v; state.showResults = false; render(); };
window.addAlly = n => { state.allyTeam.push(n); state.showResults=false; render(); };
window.removeAlly = n => { state.allyTeam = state.allyTeam.filter(x=>x!==n); state.showResults=false; render(); };
window.addEnemy = n => { state.enemyTeam.push(n); state.showResults=false; render(); };
window.removeEnemy = n => { state.enemyTeam = state.enemyTeam.filter(x=>x!==n); delete state.enemyRoles[n]; state.showResults=false; render(); };
window.assignRole = (n,r) => { state.enemyRoles[n] = state.enemyRoles[n]===r ? "" : r; state.showResults=false; render(); };
window.addPool = n => { state.champPool.push(n); state.showResults=false; render(); };
window.removePool = n => { state.champPool = state.champPool.filter(x=>x!==n); state.showResults=false; render(); };
window.analyze = () => { state.recommendations = recommendPick(); state.showResults = true; render(); };
window.goToBuild = n => { state.buildChamp = n; state.buildEnemies = [...state.enemyTeam]; state.buildResult = null; state.phase = "build"; render(); };
window.setBuildChamp = n => { state.buildChamp = n; state.buildResult=null; render(); };
window.clearBuildChamp = () => { state.buildChamp=""; state.buildResult=null; render(); };
window.addBuildEnemy = n => { state.buildEnemies.push(n); state.buildResult=null; render(); };
window.removeBuildEnemy = n => { state.buildEnemies = state.buildEnemies.filter(x=>x!==n); state.buildResult=null; render(); };
window.runBuild = () => { state.buildResult = getBuild(state.buildChamp, state.buildEnemies); render(); };

window.onSearch = function(input) {
  const q = input.value.toLowerCase().trim();
  const dd = document.getElementById(input.id + "-dd");
  const fn = input.dataset.fn;
  const filterRole = input.dataset.role;
  if (!q) { dd.style.display = "none"; return; }
  const exclude = new Set([...state.allyTeam, ...state.enemyTeam, ...state.champPool, ...state.buildEnemies, state.buildChamp].filter(Boolean));
  let results = CHAMPIONS.filter(c => c.name.toLowerCase().includes(q)).filter(c => !exclude.has(c.name));
  if (filterRole) results = results.filter(c => c.roles.includes(filterRole));
  results = results.slice(0, 8);
  if (!results.length) { dd.style.display = "none"; return; }
  dd.style.display = "block";
  dd.innerHTML = results.map(c => {
    const wr = getChampWinrate(c.name);
    return `<div class="search-item" onclick="${fn}('${c.name}')"><span>${c.sprite}</span><span style="font-weight:600">${c.name}</span><span class="meta">${c.roles.join('/')} ${c.dmgType.toUpperCase()}${wr?' • '+wr+'%':''}</span></div>`;
  }).join('');
};

function bindEvents() {
  document.addEventListener("click", e => {
    document.querySelectorAll(".search-dropdown").forEach(dd => {
      if (!dd.parentElement.contains(e.target)) dd.style.display = "none";
    });
  });
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
render();
connectAPI();
</script>
</body>
</html>
